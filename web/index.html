<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048 Solver</title>
  <link rel="stylesheet" href="static/style.css">
</head>
<body>
  <main class="container">
    <header>
      <h1>2048 Solver</h1>
      <p class="subtitle">Expectimax · 브라우저에서 직접 계산</p>
    </header>

    <section class="status" id="status">칸을 클릭해 보드를 설정하세요. 중간 상태에서 시작해도 됩니다.</section>

    <div class="boards">
      <div class="board-panel">
        <h2>현재 보드</h2>
        <div class="grid" id="current-grid"></div>
        <p class="recommendation" id="recommendation" hidden></p>
      </div>
    </div>

    <section class="controls">
      <div class="tile-picker" id="tile-picker">
        <span class="tile-picker-label">타일:</span>
        <div class="tile-picker-buttons" id="tile-picker-buttons"></div>
      </div>
      <div class="actions">
        <button type="button" id="solve-btn" disabled>다음 수 계산</button>
        <button type="button" id="reset-btn">처음부터</button>
      </div>
    </section>

    <section class="help">
      <ol>
        <li>타일을 고른 뒤 칸을 클릭해 보드를 만듭니다. 처음부터·중간 상태 모두 가능합니다.</li>
        <li><strong>지우기</strong>로 타일을 제거할 수 있습니다.</li>
        <li><strong>다음 수 계산</strong> 후 보드가 이동 결과로 바뀌면, 생성된 타일 1개를 빈 칸에 놓습니다.</li>
      </ol>
    </section>
  </main>

  <script src="static/solver.js"></script>
  <script src="static/app.js"></script>
</body>
</html>
